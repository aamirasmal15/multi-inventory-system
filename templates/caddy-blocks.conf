# Blocs Caddy frontaux, un par section (### nom ###). create-asso.sh en extrait
# UN bloc à la fois (voir extract_section) puis substitue __HOST__ / __NAME__ /
# __SCAN_HOST__ / __SCAN_HOST_ALT__ avant de l'ajouter à ~/front/Caddyfile.
#
# - mobile            : InvenTree + interstitiel d'avertissement mobile
# - simple            : InvenTree seul (template mobile-warning.html absent)
# - scannette         : sous-domaine Scannette
# - scannette-alias   : sous-domaine Scannette + redirection depuis l'alias "scanette" (1 seul n)

### mobile ###

__HOST__ {
    # Seule la RACINE est interceptée (path exacts : / et l'accueil /web) : le
    # visiteur qui « vient se connecter » a droit à l'avertissement, mais tout
    # lien profond passe direct : emails de confirmation/réinitialisation de
    # compte, fiches d'objets, callbacks OIDC… (un interstitiel au milieu de
    # ces flux les cassait).
    @mobile {
        method GET
        path / /web /web/
        header Sec-Fetch-Dest document
        header_regexp User-Agent (?i)(android|iphone|ipod|mobile)
        not header_regexp Cookie inv_skip_once=1
    }
    handle @mobile {
        root * /srv/pages
        rewrite * /mobile-warning-__NAME__.html
        file_server
    }
    @warnassets path /img/*
    handle @warnassets {
        reverse_proxy __NAME__-scan:80
    }
    reverse_proxy __NAME__-proxy:80
}

### simple ###

__HOST__ {
    reverse_proxy __NAME__-proxy:80
}

### scannette-alias ###

__SCAN_HOST__, __SCAN_HOST_ALT__ {
    @alias host __SCAN_HOST_ALT__
    redir @alias https://__SCAN_HOST__{uri} 301
    reverse_proxy __NAME__-scan:80
}

### scannette ###

__SCAN_HOST__ {
    reverse_proxy __NAME__-scan:80
}
