# =============================================================
# inventree-settings.conf : la "forme" InvenTree posée à la CRÉATION
# de chaque asso. Tout reste MODIFIABLE ensuite dans l'UI.
#
# Format : CLÉ  VALEUR      ({NAME} est remplacé par le nom de l'asso)
# Une clé inconnue (renommée dans une future version) => WARNING, jamais d'arrêt.
#
# Lister les clés dispo sur ta version :
#   docker exec <nom>-server python3 manage.py shell -c \
#     "from common.models import InvenTreeSetting as S; print('\n'.join(sorted(S.SETTINGS)))"
# =============================================================

INVENTREE_COMPANY_NAME         {NAME}
INVENTREE_DEFAULT_CURRENCY     EUR
INVENTREE_BACKUP_ENABLE        True
# connexion : SSO EirbConnect seulement, pas d'auto-inscription par mot de
# passe sur la page de connexion (les comptes arrivent par le SSO)
LOGIN_ENABLE_REG               False
LOGIN_ENABLE_SSO               True
LOGIN_ENABLE_SSO_REG           True
BARCODE_ENABLE                 False
# les QR générés par InvenTree affichent leur donnée en texte en dessous
BARCODE_SHOW_TEXT              True
PART_COMPONENT                 False
PART_PURCHASEABLE              False
# ---- dégraissage : tout ce qui ne sert pas à une asso (défauts True en 1.4.1).
# Build/Achats/Ventes n'ont PAS de flag global : déjà masqués aux membres par
# les rôles du groupe membres_<nom> (lib/finalize.py) ; visibles admin only.
# formulaire de création de pièce : pas de section « fournisseur initial »
PART_CREATE_SUPPLIER           False
# champ « révision » des pièces
PART_ENABLE_REVISION           False
# verrouillage de pièces (personne ne s'en sert)
PART_ENABLE_LOCKING            False
# onglet « pièces liées »
PART_SHOW_RELATED              False
# rapports PDF (bons de commande/livraison, BOM, rapports de tests…) ;
# ne touche PAS aux étiquettes (LABEL_ENABLE reste True), les QR passent par là
REPORT_ENABLE                  False
STOCK_ENABLE_EXPIRY            True
STOCK_DELETE_DEPLETED_DEFAULT  False
