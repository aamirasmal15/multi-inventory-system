<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="robots" content="noindex" />
<title>Page introuvable · Scannette</title>
<script>
  // même mécanique de thème qu'index.html : cookie eir_theme si choix explicite,
  // sinon le thème du système — posé avant le rendu pour éviter le flash
  (function(){
    var m = document.cookie.match(/(?:^|; )eir_theme=([^;]+)/);
    var t = m ? decodeURIComponent(m[1]) : (window.matchMedia && matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
    document.documentElement.setAttribute("data-theme", t);
  })();
  // langue : cookie eir_lang (posé par l'app selon le profil InvenTree), sinon
  // navigateur — fr sinon anglais, même règle que core/i18n.js
  window.PAGE_LANG = (function(){
    var m = document.cookie.match(/(?:^|; )eir_lang=([^;]+)/);
    var l = (m ? decodeURIComponent(m[1]) : (navigator.language || "fr")).toLowerCase().split("-")[0];
    return l === "fr" ? "fr" : "en";
  })();
</script>
<style>
  /* Page autonome : palette recopiée de css/styles.css pour ne dépendre de rien
     (une 404 doit s'afficher même si les assets de l'app sont en vrac). */
  :root{
    --bg:#f1f3f5; --surface:#fff; --surface-2:#f8f9fa;
    --border:#dee2e6; --text:#212529; --muted:#868e96;
    --primary:#228be6; --primary-hover:#1c7ed6;
    --shadow-md:0 1px 3px rgba(0,0,0,.05),0 10px 30px -12px rgba(0,0,0,.18);
    --radius:8px;
    --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --mono:ui-monospace,SFMono-Regular,Menlo,Consolas,"Liberation Mono",monospace;
  }
  [data-theme=dark]{
    --bg:#1a1b1e; --surface:#25262b; --surface-2:#2c2e33;
    --border:#373a40; --text:#e9ecef; --muted:#909296;
    --primary:#4dabf7; --primary-hover:#74c0fc;
    --shadow-md:0 10px 30px -12px rgba(0,0,0,.6);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%}
  body{background:var(--bg);color:var(--text);font-family:var(--font);-webkit-font-smoothing:antialiased;line-height:1.5;display:grid;place-items:center;padding:24px}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow-md);max-width:400px;width:100%;padding:34px 28px calc(30px + env(safe-area-inset-bottom));text-align:center}
  /* code-barres qui « rate son scan » : des barres, dont trois laissent place au 404 */
  .barcode{display:flex;justify-content:center;align-items:flex-end;gap:4px;height:74px;margin:2px auto 18px}
  .barcode i{display:block;width:5px;height:100%;border-radius:2px;background:var(--text);opacity:.85}
  .barcode i:nth-child(2n){width:3px;opacity:.45}
  .barcode i:nth-child(3n){height:86%}
  .barcode b{font-family:var(--mono);font-weight:700;font-size:44px;line-height:1;color:var(--primary);letter-spacing:2px;padding:0 2px}
  h1{font-size:19px;margin:0 0 8px}
  p{margin:0 0 22px;font-size:14px;color:var(--muted)}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:13px 18px;border:none;border-radius:var(--radius);background:var(--primary);color:#fff;font-family:var(--font);font-size:15px;font-weight:600;text-decoration:none;cursor:pointer;transition:.12s}
  .btn:hover{background:var(--primary-hover)} .btn:active{transform:scale(.98)}
  .btn svg{width:17px;height:17px;flex:none}
  .foot{margin-top:18px;font-size:11px;color:var(--muted);opacity:.85}
</style>
</head>
<body>
  <main class="card">
    <div class="barcode" aria-hidden="true">
      <i></i><i></i><i></i><i></i><i></i>
      <b>4</b><i></i><b>0</b><i></i><b>4</b>
      <i></i><i></i><i></i><i></i><i></i>
    </div>
    <h1 id="t404">Page introuvable</h1>
    <p id="p404">Cette adresse ne correspond à rien&nbsp;: la Scannette vit à la racine.</p>
    <a class="btn" href="/">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7V5a2 2 0 0 1 2-2h2M17 3h2a2 2 0 0 1 2 2v2M21 17v2a2 2 0 0 1-2 2h-2M7 21H5a2 2 0 0 1-2-2v-2"/><line x1="7" y1="12" x2="17" y2="12"/></svg>
      <span id="b404">Ouvrir la Scannette</span>
    </a>
    <div class="foot" id="f404">Une solution EirSpace conçue par Aamir ASMAL 🚀</div>
  </main>
<script>
  // page en français par défaut : on ne réécrit qu'en anglais
  (function(){
    if (window.PAGE_LANG !== "en") return;
    document.documentElement.lang = "en";
    document.title = "Page not found · Scannette";
    document.getElementById("t404").textContent = "Page not found";
    document.getElementById("p404").textContent = "There's nothing at this address: the Scannette lives at the root.";
    document.getElementById("b404").textContent = "Open the Scannette";
    document.getElementById("f404").textContent = "An EirSpace solution designed by Aamir ASMAL 🚀";
  })();
</script>
</body>
</html>
